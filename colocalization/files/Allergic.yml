dbsnp_vcf_file_locs:
  GRCh37: "/project/voight_datasets/dbSNP/dbSNP155.GRCh37.vcf.gz"
  GRCh38: "/project/voight_datasets/dbSNP/dbSNP155.GRCh38.vcf.gz"
conversion_dictionary_locs:
  rsid_to_GRCh37: "/project/voight_datasets/sumstats_reformatting/dictionaries/rs_to_GRCh37.json"
  GRCh37_to_rsid: "/project/voight_datasets/sumstats_reformatting/dictionaries/GRCh37_to_rs.json"
  rsid_to_GRCh38: "/project/voight_datasets/sumstats_reformatting/dictionaries/rs_to_GRCh38.json"
  GRCh38_to_rsid: "/project/voight_datasets/sumstats_reformatting/dictionaries/GRCh38_to_rs.json"
  GRCh37_to_GRCh38: "/project/voight_datasets/sumstats_reformatting/dictionaries/GRCh37_to_GRCh38.json"
  GRCh38_to_GRCh37: "/project/voight_datasets/sumstats_reformatting/dictionaries/GRCh38_to_GRCh37.json"
